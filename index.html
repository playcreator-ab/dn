<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Death Note Local Logger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #d1d5db; font-family: 'Courier New', Courier, monospace; }
        .notebook-page { background: #111; border: 1px solid #333; border-left: 5px solid #7f1d1d; }
        .log-entry { border-left: 4px solid #7f1d1d; transition: all 0.5s ease; }
        .log-entry.completed { border-left-color: #3f3f46; opacity: 0.8; }
        .death-note-header { text-shadow: 0 0 10px #7f1d1d; letter-spacing: 0.1em; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        .status-badge { font-size: 8px; text-transform: uppercase; padding: 2px 6px; border: 1px solid #7f1d1d; color: #7f1d1d; }
        .status-completed { border-color: #3f3f46; color: #52525b; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-12">

    <div class="max-w-2xl mx-auto space-y-8">
        
        <header class="text-center pb-8">
            <h1 class="death-note-header text-5xl font-bold text-red-900 tracking-widest uppercase">Death Note</h1>
            <p class="text-slate-600 mt-4 uppercase text-xs">Human whose name is written in this note shall die.</p>
        </header>

        <main class="notebook-page p-8 rounded shadow-2xl">
            <textarea 
                id="inputArea"
                class="w-full h-40 bg-black border border-slate-800 rounded p-4 focus:outline-none focus:border-red-900 transition-all text-red-500 placeholder-slate-700 resize-none"
                placeholder="Enter log entry..."></textarea>
            
            <div class="mt-4 flex justify-end">
                <button 
                    onclick="handleWrite()"
                    class="bg-red-950 hover:bg-red-900 text-red-500 font-bold py-2 px-8 border border-red-800 transition-all shadow-lg hover:shadow-red-900/50">
                    WRITE
                </button>
            </div>
        </main>

        <section class="space-y-4">
            <div class="flex justify-between items-center border-b border-slate-800 pb-2">
                <h2 class="text-slate-500 uppercase tracking-tighter">Entry Logs</h2>
                <button onclick="clearLogs()" class="text-[10px] text-slate-700 hover:text-red-900 transition-colors">Purge</button>
            </div>
            <div id="logFeed" class="space-y-4">
                <!-- Logs will be injected here -->
            </div>
        </section>
    </div>

    <script>
        // Load logs from localStorage
        function getLogs() {
            const logs = localStorage.getItem('deathNoteLogs');
            return logs ? JSON.parse(logs) : [];
        }

        // Save logs to localStorage
        function saveLogs(logs) {
            localStorage.setItem('deathNoteLogs', JSON.stringify(logs));
            renderLogs();
        }

        // Update the UI
        function renderLogs() {
            const logFeed = document.getElementById('logFeed');
            const logs = getLogs();
            logFeed.innerHTML = "";
            
            // Sort by newest first
            logs.sort((a, b) => b.timestamp - a.timestamp);

            logs.forEach(log => {
                const logEntry = document.createElement('div');
                logEntry.className = `log-entry p-6 bg-[#0a0a0a] rounded-r border-l-4 border-red-900 shadow-xl ${log.completed ? 'completed' : ''}`;
                logEntry.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <div class="text-[10px] text-slate-700 font-bold tracking-widest">[ ${new Date(log.timestamp).toLocaleTimeString()} ]</div>
                        <div class="status-badge ${log.completed ? 'status-completed' : ''}">${log.completed ? 'DECEASED' : 'PENDING'}</div>
                    </div>
                    <div class="leading-relaxed text-sm text-slate-300">
                        <div class="text-white font-bold uppercase">${log.text}</div>
                    </div>
                `;
                logFeed.appendChild(logEntry);
            });
        }

        // Handle user input
        window.handleWrite = () => {
            const input = document.getElementById('inputArea').value.trim();
            if (!input) return;

            const id = Date.now();
            const newEntry = {
                id: id,
                text: input, // Store the entire input string
                timestamp: id,
                completed: false
            };

            const logs = getLogs();
            logs.push(newEntry);
            saveLogs(logs);
            document.getElementById('inputArea').value = "";

            // Auto-complete logic after 5 seconds
            setTimeout(() => {
                const currentLogs = getLogs();
                const targetEntry = currentLogs.find(l => l.id === id);
                if (targetEntry) {
                    targetEntry.completed = true;
                    saveLogs(currentLogs);
                }
            }, 5000);
        };

        // Clear all logs
        window.clearLogs = () => {
            localStorage.removeItem('deathNoteLogs');
            renderLogs();
        };

        // Initial render
        renderLogs();
    </script>
</body>
</html>
